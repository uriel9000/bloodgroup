<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile | Admin Panel V3</title>
    <link rel="stylesheet" href="../assets/css/tailwind.min.css">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/theme.js"></script>
    <script src="../../../js/runtime-config.js"></script>
    <script src="../components/layout.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-all flex">
    <div class="sidebar lg:flex flex-col w-[280px] bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 fixed h-full z-40 hidden"></div>

    <main class="ml-0 lg:ml-[280px] flex-1 p-10 min-h-screen transition-all">
        <!-- layout.js injects navbar here -->

        <!-- Input Section -->
        <div class="max-w-4xl mx-auto space-y-8 mt-10">
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-6">Personal Administrator Information</h2>
            
            <section class="glass-card p-10 rounded-[2.5rem] shadow-sm">
                <form id="profile-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">Full Name</label>
                            <input type="text" id="admin_name" required
                                class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-800 dark:text-white">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">Email Address</label>
                            <input type="email" id="admin_email" required
                                class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-800 dark:text-white">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">Username</label>
                            <input type="text" id="admin_username" required
                                class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-800 dark:text-white">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">Role Designation</label>
                            <input type="text" id="admin_role" value="Super Administrator" disabled
                                class="w-full px-6 py-4 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none text-slate-500 cursor-not-allowed">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">Phone Number</label>
                            <input type="tel" id="admin_phone" placeholder="+1 (555) 000-0000"
                                class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-800 dark:text-white">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">Professional Bio</label>
                            <textarea id="admin_bio" rows="2" placeholder="Tell us about your medical specialty..."
                                class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-800 dark:text-white resize-none"></textarea>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-200 dark:border-slate-700">
                        <h3 class="text-lg font-bold text-slate-800 dark:text-white mb-4">Security</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">New Password (Optional)</label>
                                <input type="password" id="new_password" placeholder="Leave blank to keep current"
                                    class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-slate-800 dark:text-white">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-3">System Display Theme</label>
                                <button type="button" onclick="ThemeManager.toggle()" class="w-full px-6 py-4 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold rounded-2xl hover:bg-slate-200 transition-all flex items-center justify-between">
                                    <span>Toggle Light/Dark Theme</span>
                                    <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-4 pt-10">
                        <button type="submit" id="save-profile" class="px-10 py-4 bg-indigo-500 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 hover:bg-indigo-600 transition-all active:scale-95 text-lg w-full md:w-auto">Update Profile</button>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <script type="module">
        import { API } from '../assets/js/api.js?v=2.3';

        async function loadProfile() {
            try {
                // For now, load default data. This routes to profile get API
                const res = await API.fetch('profile/get.php');
                if(res.success) {
                    document.getElementById('admin_name').value = res.data.name || '';
                    document.getElementById('admin_email').value = res.data.email || '';
                    document.getElementById('admin_username').value = res.data.username || '';
                    document.getElementById('admin_phone').value = res.data.phone || '';
                    document.getElementById('admin_bio').value = res.data.bio || '';
                    if (res.data.role !== 'super_admin') {
                        document.getElementById('admin_role').value = 'Administrator';
                    }
                }
            } catch (err) {
                // Silently bypass on template if missing implementation
            }
        }

        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-profile');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'Updating...';

            const payload = {
                name: document.getElementById('admin_name').value,
                email: document.getElementById('admin_email').value,
                username: document.getElementById('admin_username').value,
                phone: document.getElementById('admin_phone').value,
                bio: document.getElementById('admin_bio').value,
                password: document.getElementById('new_password').value
            };

            try {
                const res = await API.fetch('profile/update.php', { method: 'POST', body: JSON.stringify(payload) });
                if (res.success) {
                    alert('Profile updated successfully!');
                    document.getElementById('new_password').value = '';
                }
            } catch (err) {
                alert('Update failed: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        };

        loadProfile();
    </script>
</body>
</html>
