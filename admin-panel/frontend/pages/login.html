<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Blood Group Predictor V3</title>
    <link rel="stylesheet" href="../assets/css/tailwind.min.css" onload="console.log('Tailwind loaded')" onerror="console.error('Tailwind FAILED')">
    <link rel="stylesheet" href="../assets/css/styles.css" onload="console.log('Styles loaded')" onerror="console.error('Styles FAILED')">
    <script src="../../../js/runtime-config.js"></script>
    <script>
        // Force unregister all old SWs to clear stuck CDN caching loops
        if ("serviceWorker" in navigator) {
            // Unregister stale versions
            navigator.serviceWorker.getRegistrations().then(regs => {
                for(let reg of regs) reg.unregister();
            });

            window.addEventListener("load", () => {
                navigator.serviceWorker.register("../../../sw.js?v=11")
                    .then(reg => {
                        console.log("SW: v8 Active");
                        reg.update();
                    });
            });
        }
        console.log('Current Path:', window.location.pathname);
    </script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="glass-card w-full max-w-md p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-10">
            <div class="inline-flex p-4 bg-blue-500 rounded-2xl shadow-lg mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86 1.406l-1.12 1.12a2 2 0 01-1.28.57H9a2 2 0 01-2-2v-1.144a2 2 0 01.57-1.28l1.12-1.12a6 6 0 001.406-3.86l-.477-2.387a2 2 0 00-.547-1.022L7 2.914l-.307.307a2 2 0 01-1.28.57H5a2 2 0 01-2-2v-.144a2 2 0 01.57-1.28l1.12-1.12a6 6 0 001.406-3.86l-.477-2.387a2 2 0 00-.547-1.022L3 1"></path></svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-900">Admin Login</h1>
            <p class="text-slate-500 mt-2">Secure access for control panel V3</p>
        </div>

        <form id="login-form">
            <div class="mb-6">
                <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                <input type="email" id="email" required autocomplete="username"
                    class="w-full px-5 py-4 bg-slate-100 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-400"
                    placeholder="admin@example.com">
            </div>
            <div class="mb-8">
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input type="password" id="password" required autocomplete="current-password"
                    class="w-full px-5 py-4 bg-slate-100 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                    placeholder="••••••••">
            </div>
            <button type="submit" id="login-btn"
                class="w-full py-4 bg-blue-500 hover:bg-blue-600 active:scale-95 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 transition-all">
                Sign In
            </button>
        </form>
        
        <div id="error-msg" class="mt-6 text-center text-rose-500 font-medium hidden"></div>
    </div>

    <script type="module">
        import { API } from '../assets/js/api.js';

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const error = document.getElementById('error-msg');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerText = 'Verifying...';
            error.classList.add('hidden');

            try {
                // Generate a lightweight browser fingerprint
                const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
                const device_type = isMobile ? 'Mobile' : 'Desktop';
                const screenStr = `${window.screen.width}x${window.screen.height}x${window.screen.colorDepth}`;
                const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown';
                const fpData = `${navigator.userAgent}|${screenStr}|${tz}|${navigator.language}`;
                
                // Simple hash function for fingerprint string
                let hash = 0;
                for (let i = 0; i < fpData.length; i++) {
                    hash = Math.imul(31, hash) + fpData.charCodeAt(i) | 0;
                }
                const browser_fingerprint = 'fp_' + Math.abs(hash).toString(16);

                const res = await API.auth.login(email, password, { device_type, browser_fingerprint });
                if (res.success) {
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                error.innerText = err.message;
                error.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Sign In';
            }
        };
    </script>
</body>
</html>
