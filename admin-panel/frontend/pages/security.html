<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security & Monitoring | Admin Panel V3</title>
    <link rel="stylesheet" href="../assets/css/tailwind.min.css">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/theme.js"></script>
    <script src="../../../js/runtime-config.js"></script>
    <script src="../components/layout.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-all flex">
    <!-- Sidebar Placeholder (injected by layout.js) -->
    <div class="sidebar lg:flex flex-col w-[280px] bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 fixed h-full z-40 hidden"></div>

    <!-- Main Content -->
    <main class="flex-1 lg:ml-[280px] min-h-screen flex flex-col p-8 transition-all">
        <!-- layout.js injects navbar + footer -->

        <div class="mb-8 mt-4">
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white flex items-center gap-3">
                <svg class="w-8 h-8 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                Security & Monitoring
            </h1>
            <p class="text-slate-500 dark:text-slate-400">Admin login audit logs and security events.</p>
        </div>

        <!-- Summary KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-6 flex flex-col border-l-4 border-blue-500">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Total Login Events</span>
                <h2 class="text-3xl font-bold text-slate-800 dark:text-white" id="stat-total">—</h2>
                <p class="text-xs text-blue-500 font-bold mt-2">All time</p>
            </div>
            <div class="glass-card p-6 flex flex-col border-l-4 border-amber-500">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Failed Logins</span>
                <h2 class="text-3xl font-bold text-slate-800 dark:text-white" id="stat-failed">—</h2>
                <p class="text-xs text-amber-500 font-bold mt-2">Suspicious attempts</p>
            </div>
            <div class="glass-card p-6 flex flex-col border-l-4 border-rose-500">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Unique IPs</span>
                <h2 class="text-3xl font-bold text-slate-800 dark:text-white" id="stat-ips">—</h2>
                <p class="text-xs text-rose-500 font-bold mt-2">Distinct sources</p>
            </div>
        </div>

        <!-- Security Logs Table -->
        <div class="glass-card rounded-[2rem] shadow-sm overflow-hidden flex-1 flex flex-col">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                <h3 class="text-lg font-bold text-slate-800 dark:text-white">Login Audit Log</h3>
                <div class="relative">
                    <input type="text" id="sec-search" placeholder="Search IP or admin..." 
                        class="pl-10 pr-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-xl text-sm outline-none focus:ring-2 focus:ring-rose-400 dark:text-white w-56">
                    <svg class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
            <div class="overflow-x-auto flex-1">
                <table class="w-full text-left whitespace-nowrap">
                    <thead class="bg-slate-50/50 dark:bg-slate-800/50">
                        <tr>
                            <th class="px-8 py-4 font-bold text-slate-600 dark:text-slate-300 text-sm">Time</th>
                            <th class="px-8 py-4 font-bold text-slate-600 dark:text-slate-300 text-sm">Action</th>
                            <th class="px-8 py-4 font-bold text-slate-600 dark:text-slate-300 text-sm">IP Address</th>
                            <th class="px-8 py-4 font-bold text-slate-600 dark:text-slate-300 text-sm">Status</th>
                        </tr>
                    </thead>
                    <tbody id="sec-tbody" class="divide-y divide-slate-100 dark:divide-slate-800/50">
                        <tr><td colspan="4" class="px-8 py-10 text-center text-slate-400">Loading security logs...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { API } from '../assets/js/api.js?v=2.3';

        async function loadLogs(search = '') {
            const tbody = document.getElementById('sec-tbody');
            try {
                const data = await API.security.logs();
                const logs = data.logs || data.records || [];

                // Update stats
                document.getElementById('stat-total').innerText = logs.length;
                document.getElementById('stat-failed').innerText = logs.filter(l => l.action?.includes('fail') || l.status === 'failed').length;
                const ips = new Set(logs.map(l => l.ip_address).filter(Boolean));
                document.getElementById('stat-ips').innerText = ips.size;

                const filtered = search
                    ? logs.filter(l =>
                        (l.ip_address || '').includes(search) ||
                        (l.action || '').toLowerCase().includes(search.toLowerCase()))
                    : logs;

                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="px-8 py-10 text-center text-slate-500 italic">No security events found.</td></tr>';
                    return;
                }

                tbody.innerHTML = filtered.map(log => {
                    const isFail = log.action?.includes('fail') || log.status === 'failed';
                    const statusClass = isFail
                        ? 'bg-rose-100 dark:bg-rose-900/30 text-rose-700 dark:text-rose-300'
                        : 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300';
                    const statusText = isFail ? 'Suspicious' : 'Normal';
                    return `
                        <tr class="hover:bg-slate-50/50 dark:hover:bg-slate-800/30 transition-all text-slate-700 dark:text-slate-300">
                            <td class="px-8 py-4 text-sm">${new Date(log.created_at).toLocaleString()}</td>
                            <td class="px-8 py-4 font-medium">${log.action || 'Login'}</td>
                            <td class="px-8 py-4 font-mono text-sm text-slate-500">${log.ip_address || 'N/A'}</td>
                            <td class="px-8 py-4"><span class="px-2 py-1 rounded-lg text-xs font-bold ${statusClass}">${statusText}</span></td>
                        </tr>`;
                }).join('');
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-8 py-10 text-center text-rose-500 font-medium">Failed to load security logs: ${err.message}</td></tr>`;
            }
        }

        let searchTimeout;
        document.getElementById('sec-search').addEventListener('input', e => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => loadLogs(e.target.value), 300);
        });

        loadLogs();
    </script>
</body>
</html>
